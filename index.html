<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reestar - Restaurant Menu</title>
    <style>
        /* --- General Reset & Page Styles --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #ffffff;
            color: #000000;
        }

        /* --- Header / Navigation Area --- */
        header {
            background-color: #000000;
            color: #ffffff;
            text-align: center;
            padding: 25px 0;
        }

        header h1 {
            font-size: 2.2rem;
            margin-bottom: 5px;
            font-family: 'Times New Roman', Times, serif; /* Matches serif text in image */
            letter-spacing: 1px;
        }

        header nav {
            font-size: 0.9rem;
            color: #ffffff;
        }

        header nav a {
            color: #ffffff;
            text-decoration: none;
            margin: 0 4px;
        }

        header nav a:hover {
            text-decoration: underline;
        }

        /* --- Food Menu Grid Area --- */
        .menu-section {
            display: flex;
            justify-content: center;
            align-items: stretch;
            gap: 12px;
            padding: 60px 20px;
            max-width: 1100px;
            margin: 0 auto;
            flex-wrap: wrap; /* Allows wrapping cleanly on smaller screens */
        }

        /* Menu Item Box styling to match image borders */
        .menu-card {
            border: 2px solid #000000;
            width: 230px;
            display: flex;
            flex-direction: column;
            background-color: #ffffff;
        }

        .menu-card img {
            width: 100%;
            height: 260px;
            object-fit: cover; /* Keeps image proportions correct */
            border-bottom: 2px solid #000000;
        }

        .card-body {
            padding: 15px 10px;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            flex-grow: 1;
        }

        .card-body h3 {
            font-size: 0.95rem;
            font-weight: bold;
            margin-bottom: 5px;
            line-height: 1.2;
        }

        .card-body p {
            font-size: 0.85rem;
            color: #000000;
            margin-bottom: 15px;
        }

        /* Black Order Button */
        .order-btn {
            background-color: #000000;
            color: #ffffff;
            border: none;
            padding: 8px 0;
            width: 85%;
            margin: 0 auto;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: bold;
            text-transform: none;
        }

        /* --- Contact Section --- */
        .contact-section {
            background-color: #000000;
            color: #ffffff;
            padding: 40px 20px;
            text-align: center;
        }

        .contact-section h2 {
            font-family: 'Times New Roman', Times, serif;
            margin-bottom: 25px;
            font-size: 2rem;
            font-weight: normal;
        }

        .form-wrapper {
            max-width: 320px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* Aligns form labels and inputs like the grid layout in the photo */
        .form-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .form-row label {
            font-size: 0.95rem;
            width: 60px;
            text-align: left;
        }

        .form-row input {
            width: 240px;
            padding: 6px 8px;
            border: 1px solid #ffffff;
            background-color: #ffffff;
            color: #000000;
            outline: none;
            font-size: 0.9rem;
        }

        /* Yellow Send Button */
        .send-button {
            background-color: #ffff00;
            color: #000000;
            border: none;
            padding: 10px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 15px;
            width: 100%;
        }

        .send-button:hover {
            background-color: #e6e600;
        }
    </style>
</head>
<body>

    <!-- Header / Navbar Section -->
    <header>
        <h1>Reestar</h1>
        <nav>
            <a href="#">Home</a> | 
            <a href="#">Recipe</a> | 
            <a href="#">Contact</a>
        </nav>
    </header>

    <!-- Food Cards Section -->
    <main class="menu-section">
        
        <!-- Dish Card 1 -->
        <div class="menu-card">
            <img src="https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=500" alt="Tamarind Prawn Curry">
            <div class="card-body">
                <h3>Tangy Tamarind Prawn Curry</h3>
                <p>Something which is very delicious</p>
                <button class="order-btn">Order Now</button>
            </div>
        </div>

        <!-- Dish Card 2 -->
        <div class="menu-card">
            <img src="https://images.unsplash.com/photo-1565299624946-b28f40a0ae38?w=500" alt="Tamarind Prawn Curry">
            <div class="card-body">
                <h3>Tangy Tamarind Prawn Curry</h3>
                <p>Something which is very delicious</p>
                <button class="order-btn">Order Now</button>
            </div>
        </div>

        <!-- Dish Card 3 -->
        <div class="menu-card">
            <img src="https://images.unsplash.com/photo-1512621776951-a57141f2eefd?w=500" alt="Tamarind Prawn Curry">
            <div class="card-body">
                <h3>Tangy Tamarind Prawn Curry</h3>
                <p>Something which is very delicious</p>
                <button class="order-btn">Order Now</button>
            </div>
        </div>

        <!-- Dish Card 4 -->
        <div class="menu-card">
            <img src="https://images.unsplash.com/photo-1567620905732-2d1ec7ab7445?w=500" alt="Tamarind Prawn Curry">
            <div class="card-body">
                <h3>Tangy Tamarind Prawn Curry</h3>
                <p>Something which is very delicious</p>
                <button class="order-btn">Order Now</button>
            </div>
        </div>

    </main>

    <!-- Contact Form Section -->
    <section class="contact-section">
        <h2>Contact Us</h2>
        <form class="form-wrapper" action="#" method="POST" onsubmit="event.preventDefault(); alert('Form submitted!');">
            <div class="form-row">
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" placeholder="Name" required>
            </div>
            <div class="form-row">
                <label for="age">Age:</label>
                <input type="text" id="age" name="age" placeholder="Age" required>
            </div>
            <div class="form-row">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" placeholder="Email" required>
            </div>
            <button type="submit" class="send-button">Send</button>
        </form>
    </section>

</body>
</html>
